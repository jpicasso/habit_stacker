---
title: 'Feedback'
feedbackNav: true
---

{{> navbar}}

<main class="main main--interior">
  <div class="i-section mb-4">
    <div class="container-fluid">
      <div class="row">
        <section class="col-12 col-lg-8 mx-auto content">
          <h1 class="display-3 mb-3">Feedback</h1>
          <p class="lead text-muted mb-4">
            Tell us what you think about Uprise University. Your rating and comments help us improve the site and course materials.
          </p>

          <div id="feedback-error" class="alert alert-danger" style="display: none;" role="alert"></div>

          <form id="feedback-form" class="feedback-form" novalidate>
            <fieldset class="form-group">
              <legend class="h5 mb-3">How satisfied are you with Uprise University?</legend>
              <div class="feedback-rating-list">
                <label class="feedback-rating-option d-flex align-items-start mb-2">
                  <input class="mt-1 mr-2" type="radio" name="feedback-rating" value="1" required>
                  <span><strong>1</strong> — Very dissatisfied; I will stop using it</span>
                </label>
                <label class="feedback-rating-option d-flex align-items-start mb-2">
                  <input class="mt-1 mr-2" type="radio" name="feedback-rating" value="2">
                  <span><strong>2</strong> — Dissatisfied; I will use it, but I wouldn't recommend it</span>
                </label>
                <label class="feedback-rating-option d-flex align-items-start mb-2">
                  <input class="mt-1 mr-2" type="radio" name="feedback-rating" value="3">
                  <span><strong>3</strong> — Neutral</span>
                </label>
                <label class="feedback-rating-option d-flex align-items-start mb-2">
                  <input class="mt-1 mr-2" type="radio" name="feedback-rating" value="4">
                  <span><strong>4</strong> — Satisfied; I will share it with some friends</span>
                </label>
                <label class="feedback-rating-option d-flex align-items-start mb-3">
                  <input class="mt-1 mr-2" type="radio" name="feedback-rating" value="5">
                  <span><strong>5</strong> — I love it; I am going to share it with everyone</span>
                </label>
              </div>
            </fieldset>

            <div class="form-group">
              <label for="feedback-details">Your feedback</label>
              <textarea
                class="form-control"
                id="feedback-details"
                rows="6"
                placeholder="Share anything you'd like us to know…"
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary" id="feedback-submit">Submit</button>
          </form>
        </section>
      </div>
    </div>
  </div>
</main>

<script defer src="/js/feedback.js"></script>

{{> main-site-footer }}
