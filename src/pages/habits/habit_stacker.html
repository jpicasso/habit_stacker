---
title: 'My Habits'
---

{{> navbar}}

<link rel="stylesheet" href="/habits/habits.css">

<main class="main main--interior">
  <div class="i-section mb-4">
    <div class="container-fluid">
      <div class="row">
        <!-- <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
        </nav>
        <section class="col-md-9 ml-sm-auto col-lg-10 content"> -->
          <!-- Protected content (hidden by default) -->
          <div id="private-content" style="display: none;">
            <!-- Habit Management Section -->
            <div class="mt-2">
   <!-- *************************************** -->
   <!-- ***********                 *********** -->
   <!-- ***********  Pop up modals  *********** -->
   <!-- ***********                 *********** -->
   <!-- *************************************** -->
            
          <!-- Edit Habit Modal -->
          <div class="modal fade" id="editEventModal" tabindex="-1" role="dialog" aria-labelledby="editEventModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="editEventModalLabel">Edit Habit</h5>
                  <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <form id="edit-task-form">
                    <input type="hidden" id="edit-task-id">
                    <div class="form-group">
                      <label for="edit-task-input">Habit *</label>
                      <input type="text" class="form-control" id="edit-task-input" placeholder="Enter habit" required>
                    </div>
                    <div class="form-group">
                      <label for="edit-event-date">Start Date *</label>
                      <input type="date" class="form-control" id="edit-event-date" required>
                    </div>
                  </form>
                </div>
                <div class="modal-footer justify-content-between">
                  <button type="button" class="btn btn-danger" id="edit-delete-btn">Delete</button>
                  <div>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveEditTask()">Save Changes</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
    <!-- *************************************** -->
   <!-- ***********                 *********** -->
   <!-- ***********  Displayed HTML *********** -->
   <!-- ***********                 *********** -->
   <!-- *************************************** -->

              
              <!-- Habits Table -->
              <div class="card" id="habits-section">
                <div class="card-body">
                  <div id="tasks-loading" class="text-center py-3">
                    <div class="spinner-border" role="status">
                      <span class="sr-only">Loading...</span>
                    </div>
                  </div>
                  <div id="tasks-error" class="alert alert-danger" style="display: none;"></div>
                  <div id="tasks-empty" class="alert alert-info" style="display: none;">No Habits added yet. Add one below!</div>
                  <div class="table-responsive">
                    <!-- loadTasks() function creates this table -->
                    <table class="table table-striped table-hover" id="tasks-table" style="display: none;">
                      <thead>
                        <tr>
                          <th>Habit</th>
                          <th>Days<br>Kept</th>
                          <th>Start<br>Date</th>
                        </tr>
                      </thead>
                      <tbody id="tasks-tbody">
                        <!-- Habits will be inserted here -->
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              <!-- Add Habit Form -->
              <div class="card mb-4 mt-2">
                <div class="card-body">
                  <form id="task-form">
                    <div class="form-group">
                      <input type="text" class="form-control" id="task-input" placeholder="Enter Habit" required>
                    </div>
                    <div class="form-group">
                      <input type="date" class="form-control" id="event-date" placeholder="mm/dd/yyyy" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add New Habit</button>
                  </form>
                </div>
              </div>
 
          <!-- Login required message (shown by default) -->
          <div id="login-required-message" style="display: none;">
            <h1 class="h2 mb-3">Your habits</h1>
            <div class="alert alert-warning" role="alert">
              <h4 class="alert-heading">Log in to track your stacks</h4>
              <p>Sign in to add habits, keep streaks, and pick up where you left off.</p>
              <p class="mb-0">
                <button class="btn btn-primary" onclick="handleLogin(); return false;">Log In</button>
              </p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</main>

<script src="/habits/auth_page_load.js"></script>
<script src="/habits/habits.js"></script>

{{> main-site-footer }}
