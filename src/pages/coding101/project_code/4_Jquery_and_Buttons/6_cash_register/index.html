<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Cash Register</title>
    <link rel="stylesheet" href="css/style.css" media="screen" type="text/css" />
  </head>
  <body>
    <div id="register">
      <div id="view">
        <h1>Cash Register</h1>
        <table>
          <tbody id="items">
          </tbody>
          <tfoot>
            <tr>
              <th>Total</th>
              <th id="total">$0.00</th>
            </tr>
          </tfoot>
        </table>
      </div>
      <form id="new_amount">
        <input id="amount" autofocus placeholder="How Much?">
      </form>
    </div>

    <!-- Script Goes Here -->
    <script src='http://code.jquery.com/jquery-latest.min.js'></script>
		<script src="js/index.js"></script>


  </body>
</html>
