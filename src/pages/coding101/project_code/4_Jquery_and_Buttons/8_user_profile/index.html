<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/check_box.css">
</head>
<body>
    <header> <h1> Create your profile </h1> </header>
    <fieldset> <legend> Your Contact Info</legend>
        <label> Your Name </label>
            <input type="text" id="first_name" placeholder="First">
            <input type="text" id="last_name" placeholder="Last">
        <br> <label> Cell # </label> 
            <input type="tel" id="cell">
        <br> <label> Email </label> 
            <input type="email" placeholder="email" id="email">
        <br> <label> Mentor/Mentee? </label> <select id="mentor">
            <option> Select One </option>
            <option value="mentor"> Mentor </option>
            <option value="mentee"> Mentee </option>
            <option value="both"> Both </option>
        </select>
        <br> <label> Location </label> 
            <select id="location"> <option> Select One </option> </select>
    </fieldset>
    <fieldset> <legend> Interests </legend> 
        <form id="interests"> </form> 
    </fieldset>
    <fieldset> <legend> Additional Notes </legend>
        <textarea id="notes" cols="50" rows="10"></textarea>
    </fieldset>
    <br>
    <button id="submit"> Submit </button>    

    <!-- SCRIPT TAGS GO HERE-->
    <script src='http://code.jquery.com/jquery-latest.min.js'></script>
    <script src='js/index.js'></script>

</body>
</html>
