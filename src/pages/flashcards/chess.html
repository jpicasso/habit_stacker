---
title: 'ChessFlashcards'
chess: true
coursesNav: true
course: 'Chess Flashcards'
---

{{> navbar}}

<main id="main">
  <div class="container-fluid">
    <div class="row">

      <!-- .sidebar -->
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
        <div class="sidebar-sticky">
            {{> chess-accord}}
        </div>
      </nav>
      <!-- /.sidebar -->

      <!-- .main -->
      <section class="col-md-9 ml-sm-auto col-lg-10 main">
        <!-- .tab-content -->
        <div class="tab-content mx-2 mx-md-4 my-2 my-md-3" id="mainTabContent">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="..//courses.html">Courses</a></li>
              <li class="breadcrumb-item active" aria-current="page">Learn a language</li>
            </ol>
          </nav>
            <!---------------------------------------------------  Cheat Sheet ----------------------    -->
            <div class="tab-pane fade show active" id="cheat-sheets" role="tabpanel" aria-labelledby="cheat-sheets-tab">
              <div class="cheat-sheet">
                <!-- Bryce Example -->
                <div class="bryce-example">
                  <!-----------------------------------------------  Life 101.4-Predictably Irrational -----------------    -->
                  <!-- #region -->

		<h2> Chess Flashcards </h2>
		<p id="scorecard"> # Correct: Not Started </p>
		<br>
		
		<div id="spanishBox" class="textWindow">
			<p id="spanishBoxText"> Select a category to start!<p>
		</div>
		<div id='nextSection' class="ctrWrapper">
			<button id="next" class="greenButton"> Next </button>
		</div>
		<div id="checkSection" class="ctrWrapper">
			<button id="wrong"></button>
			<button id="correct"> </button>
		</div>
		<br>

    <div id='spanishButtonArea' class="ctrWrapper">
			<select class='basicButton' id="btn-stackSize">
				<option>Stack Size</option>
			</select>
			<button class='basicButton' id='nextStack'>Next Stack </button>
		</div>
		<br>
		
		<div class="formSection">
			<form id="categories">
				<p> Select your categories</p>
				<br>
				<label class="CheckBoxContainer"> Chess Tactics
					<input type="checkbox" name="categories" value="ChessTactics">
					<span class="checkmark"></span>
				</label>
				<label class="CheckBoxContainer"> Chess Positions
					<input type="checkbox" name="categories" value="ChessPositions">
					<span class="checkmark"></span>
				</label>
			</form>
		</div>


                </div>
                <!--/Bryce Example-->
            
                <!-------------------------------------------------  /Cheat Sheet                         -->
              </div>
            </div>
          <!-- /.tab-content -->
  
        </section>
        <!-- /.main -->
    
    </div>
  </div>
  
</main>
{{> main-site-footer }}
