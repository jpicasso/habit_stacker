---
title: 'Flashcards'
pm101: true
coursesNav: true
course: 'Flashcards'
---

{{> navbar}}

<main id="main">
  <div class="container-fluid">
    <div class="row">

      <!-- .sidebar -->
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
        <div class="sidebar-sticky">
            {{> flashcards-accord}}
        </div>
      </nav>
      <!-- /.sidebar -->

      <!-- .main -->
      <section class="col-md-9 ml-sm-auto col-lg-10 main">
        <!-- .tab-content -->
        <div class="tab-content mx-2 mx-md-4 my-2 my-md-3" id="mainTabContent">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="..//courses.html">Courses</a></li>
              <li class="breadcrumb-item active" aria-current="page">Learn a language</li>
            </ol>
          </nav>
            <!---------------------------------------------------  Cheat Sheet ----------------------    -->
            <div class="tab-pane fade show active" id="cheat-sheets" role="tabpanel" aria-labelledby="cheat-sheets-tab">
              <div class="cheat-sheet">
                <!-- Bryce Example -->
                <div class="bryce-example">
                  <!-----------------------------------------------  Life 101.4-Predictably Irrational -----------------    -->
                  <!-- #region -->

		<h2> Consulting Math </h2>
		<p id="scorecard"> # Correct: Not Started </p>
		<br>
		
		<div id="spanishBox" class="textWindow">
			<p id="spanishBoxText"> Select a category to start!<p>
		</div>
		<form id="numberInputForm" class="mb-3">
			<label for="userNumber" class="form-label">Enter a number:</label>
			<input type="number" id="userNumber" name="userNumber" class="form-control" required>
			<div class="text-center mt-2">
				<button type="submit" class="btn btn-primary">Submit</button>
			</div>
		</form>
		<div id='nextSection' class="ctrWrapper">
			<button id="next" class="greenButton"> Next </button>
		</div>
		<div id="checkSection" class="ctrWrapper">
			<button id="wrong"></button>
			<button id="correct"> </button>
		</div>
		<br>
		
		<div class="formSection">
			<form id="categories">
				<p> Select your math games</p>
				<br>
				<label class="CheckBoxContainer"> Number Memorization
					<input type="checkbox" name="categories" value="NumberMemorization">
					<span class="checkmark"></span>
				</label>
				<label class="CheckBoxContainer"> Restaurant tips
					<input type="checkbox" name="categories" value="RestaurantTips">
					<span class="checkmark"></span>
				</label>
				<label class="CheckBoxContainer"> Big Numbers
					<input type="checkbox" name="categories" value="BigNumbers">
					<span class="checkmark"></span>
				</label>
				<label class="CheckBoxContainer"> Double Digit Multiplication
					<input type="checkbox" name="categories" value="DoubleDigitMultiplication">
					<span class="checkmark"></span>
				</label>
				<label class="CheckBoxContainer"> Percentages
					<input type="checkbox" name="categories" value="Percentages">
					<span class="checkmark"></span>
				</label>
			</form>
		</div>


                </div>
                <!--/Bryce Example-->
            
                <!-------------------------------------------------  /Cheat Sheet                         -->
              </div>
            </div>
          <!-- /.tab-content -->
  
        </section>
        <!-- /.main -->
    
    </div>
  </div>
  
</main>
{{> main-site-footer }}
