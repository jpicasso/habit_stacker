---
title: 'Set New Password'
---

{{> navbar}}

<main class="main main--interior">
  <div class="i-section mb-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5 mt-4">

          <div class="card">
            <div class="card-body">
              <h1 class="h3 mb-3">Set a new password</h1>
              <p class="text-muted" id="reset-status">Checking your reset link…</p>

              <div id="auth-error" class="alert alert-danger" style="display: none;"></div>
              <div id="auth-info" class="alert alert-info" style="display: none;"></div>

              <form id="reset-form" style="display: none;">
                <div class="form-group">
                  <label for="reset-password">New password</label>
                  <input type="password" class="form-control" id="reset-password" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                  <label for="reset-password-confirm">Confirm new password</label>
                  <input type="password" class="form-control" id="reset-password-confirm" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="reset-submit">Update password</button>
              </form>

              <p class="mt-3 mb-0 text-center">
                <a href="/login.html">Back to log in</a>
              </p>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</main>

<script>
  (function () {
    const statusEl = document.getElementById('reset-status');
    const formEl = document.getElementById('reset-form');
    const submitEl = document.getElementById('reset-submit');
    const errorEl = document.getElementById('auth-error');
    const infoEl = document.getElementById('auth-info');

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      infoEl.style.display = 'none';
    }

    function showInfo(message) {
      infoEl.textContent = message;
      infoEl.style.display = 'block';
      errorEl.style.display = 'none';
    }

    function enableForm() {
      statusEl.textContent = 'Choose a new password for your account.';
      formEl.style.display = 'block';
    }

    function waitForRecovery(retries) {
      if (!window.appAuth || !window.appAuth.client) {
        if (retries > 0) {
          setTimeout(function () { waitForRecovery(retries - 1); }, 100);
        } else {
          statusEl.textContent = '';
          showError('Authentication is not configured yet.');
        }
        return;
      }

      const client = window.appAuth.client;

      // Session from the email link is applied when the client loads (detectSessionInUrl).
      client.auth.getSession().then(function (result) {
        if (result.data && result.data.session) {
          enableForm();
          return;
        }
        statusEl.textContent = '';
        showError('This reset link is invalid or has expired. Request a new one from the login page.');
      });

      client.auth.onAuthStateChange(function (event, session) {
        if (event === 'PASSWORD_RECOVERY' || (session && event === 'SIGNED_IN')) {
          enableForm();
        }
      });
    }

    formEl.addEventListener('submit', async function (e) {
      e.preventDefault();
      errorEl.style.display = 'none';
      infoEl.style.display = 'none';

      const password = document.getElementById('reset-password').value;
      const confirm = document.getElementById('reset-password-confirm').value;
      if (password !== confirm) {
        showError('Passwords do not match.');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      submitEl.disabled = true;
      try {
        const { error } = await window.appAuth.client.auth.updateUser({ password: password });
        if (error) throw error;
        showInfo('Password updated. Redirecting to your habits…');
        setTimeout(function () {
          window.location.href = '/habits/habit_stacker.html';
        }, 1000);
      } catch (err) {
        console.error('Reset password error:', err);
        showError(err.message || 'Could not update password. Try requesting a new reset link.');
        submitEl.disabled = false;
      }
    });

    waitForRecovery(40);
  })();
</script>
