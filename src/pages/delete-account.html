---
title: 'Delete Account'
---

{{> navbar}}

<main class="main main--interior">
  <div class="i-section mb-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 mt-4">

          <div id="delete-login-required" style="display: none;">
            <h1 class="h3 mb-3">Delete Account</h1>
            <div class="alert alert-warning" role="alert">
              <p class="mb-3">You must be logged in to delete your account.</p>
              <button class="btn btn-primary" onclick="handleLogin(); return false;">Log In</button>
            </div>
          </div>

          <div id="delete-account-panel" style="display: none;">
            <div class="card border-danger">
              <div class="card-body">
                <h1 class="h3 mb-3 text-danger">Delete Account</h1>
                <p>
                  This permanently deletes your Habit Stacker account and all of your habits.
                  This cannot be undone.
                </p>
                <p class="text-muted mb-3">
                  Signed in as <strong id="delete-account-email"></strong>
                </p>

                <div id="delete-error" class="alert alert-danger" style="display: none;"></div>

                <div class="form-group">
                  <label for="delete-confirm-input">Type <strong>DELETE</strong> to confirm</label>
                  <input type="text" class="form-control" id="delete-confirm-input" autocomplete="off" placeholder="DELETE">
                </div>

                <button type="button" class="btn btn-danger btn-block" id="delete-account-btn" disabled>
                  Permanently delete my account
                </button>
                <a href="/habits/habit_stacker.html" class="btn btn-link btn-block">Cancel</a>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</main>

<script>
  (function () {
    const loginRequiredEl = document.getElementById('delete-login-required');
    const panelEl = document.getElementById('delete-account-panel');
    const emailEl = document.getElementById('delete-account-email');
    const confirmInput = document.getElementById('delete-confirm-input');
    const deleteBtn = document.getElementById('delete-account-btn');
    const errorEl = document.getElementById('delete-error');

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function setAuthenticatedUI(session) {
      if (session && session.user) {
        loginRequiredEl.style.display = 'none';
        panelEl.style.display = 'block';
        emailEl.textContent = session.user.email || session.user.id;
      } else {
        panelEl.style.display = 'none';
        loginRequiredEl.style.display = 'block';
      }
    }

    async function refreshAuthUI() {
      try {
        if (!window.appAuth) {
          setAuthenticatedUI(null);
          return;
        }
        const session = await window.appAuth.getSession();
        setAuthenticatedUI(session);
      } catch (err) {
        console.error(err);
        setAuthenticatedUI(null);
      }
    }

    confirmInput.addEventListener('input', function () {
      deleteBtn.disabled = confirmInput.value.trim() !== 'DELETE';
    });

    deleteBtn.addEventListener('click', async function () {
      if (confirmInput.value.trim() !== 'DELETE') return;
      errorEl.style.display = 'none';
      deleteBtn.disabled = true;

      try {
        const session = await window.appAuth.getSession();
        if (!session || !session.access_token) {
          showError('Your session expired. Please log in again.');
          setAuthenticatedUI(null);
          return;
        }

        const response = await fetch('/api/account/delete', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + session.access_token,
            'Content-Type': 'application/json'
          }
        });
        const data = await response.json().catch(function () { return {}; });
        if (!response.ok) {
          throw new Error(data.error || 'Failed to delete account');
        }

        if (window.appAuth.client) {
          try { await window.appAuth.client.auth.signOut(); } catch (e) { /* ignore */ }
        }
        window.location.href = '/index.html?accountDeleted=1';
      } catch (err) {
        console.error('Delete account error:', err);
        showError(err.message || 'Something went wrong. Please try again.');
        deleteBtn.disabled = confirmInput.value.trim() !== 'DELETE';
      }
    });

    // Wait for supabase-auth.js (loaded after this page script)
    function waitForAuth(retries) {
      if (window.appAuth) {
        refreshAuthUI();
        if (window.appAuth.client) {
          window.appAuth.client.auth.onAuthStateChange(function (_event, session) {
            setAuthenticatedUI(session);
          });
        }
      } else if (retries > 0) {
        setTimeout(function () { waitForAuth(retries - 1); }, 100);
      } else {
        setAuthenticatedUI(null);
      }
    }
    waitForAuth(40);
  })();
</script>

{{> main-site-footer }}
